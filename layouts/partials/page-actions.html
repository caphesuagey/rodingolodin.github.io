{{ $currentPage := . }}

<div class="page-actions">
  <div>
    <button
      type="button"
      class="dropdown-toggle"
      id="page-actions-button"
      aria-expanded="false"
      aria-haspopup="true"
    >
      <div class="button-content">
        <svg class="button-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2"></path>
        </svg>
        <span class="button-text">Copy for LLM</span>
      </div>

      <div class="button-separator"></div>

      <div class="dropdown-toggle-area" aria-label="Open menu">
        <svg class="chevron-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
        </svg>
      </div>
    </button>
  </div>

  <div class="dropdown-menu hidden" role="menu" aria-orientation="vertical" aria-labelledby="page-actions-button">
    <div class="dropdown-content">
      <button class="copy-page dropdown-item is-selected" role="menuitem" data-action="copy-page">
        <div class="dropdown-item-content">
          <svg class="item-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2"></path>
          </svg>
          <span>
            Copy for LLM
            <span class="item-description">Copy page as Markdown for LLMs</span>
          </span>
        </div>
      </button>

      <button class="view-markdown dropdown-item" role="menuitem" data-action="view-markdown">
        <div class="dropdown-item-content">
          <svg class="item-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
          </svg>
          <span>
            View as Markdown
            <span class="item-description">View this page as plain text</span>
          </span>
        </div>
      </button>
    </div>
  </div>
</div>

<div id="raw-content" style="display:none;">{{ .RawContent }}</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const button = document.getElementById('page-actions-button');
  const menu = document.querySelector('.dropdown-menu');
  const buttonText = button?.querySelector('.button-text');

  if (!button || !menu || !buttonText) return;

  const getMarkdownContent = () => {
    const rawContent = document.getElementById('raw-content');
    return rawContent ? rawContent.textContent : '';
  };

  const showCopiedFeedback = () => {
    const previous = buttonText.textContent;
    buttonText.textContent = 'Copied';

    setTimeout(() => {
      buttonText.textContent = previous;
    }, 2000);
  };

  const copyContent = async () => {
    const content = getMarkdownContent();

    try {
      await navigator.clipboard.writeText(content);
      showCopiedFeedback();
    } catch (err) {
      console.error('Failed to copy:', err);
    }
  };

  const viewMarkdown = () => {
    const content = getMarkdownContent();
    const newWindow = window.open('', '_blank');
    if (!newWindow) return;

    const escaped = content
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');

    newWindow.document.open();
    newWindow.document.write(`
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Markdown Content</title>
<style>
body {
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
  padding: 8px 12px;
  margin: 0;
  line-height: 1.5;
}
pre {
  margin: 0;
  white-space: pre-wrap;
  font: inherit;
}
</style>
</head>
<body>
<pre>${escaped}</pre>
</body>
</html>
    `);
    newWindow.document.close();
  };

  const ACTIONS = {
    'copy-page': {
      label: 'Copy for LLM',
      run: copyContent
    },
    'view-markdown': {
      label: 'View as Markdown',
      run: viewMarkdown
    }
  };

  let selectedAction = 'copy-page';

  const setSelected = (actionKey) => {
    selectedAction = actionKey;
    buttonText.textContent = ACTIONS[actionKey].label;

    menu.querySelectorAll('.dropdown-item').forEach((el) => {
      el.classList.toggle('is-selected', el.dataset.action === actionKey);
    });
  };

  const toggleDropdown = (e) => {
    e.stopPropagation();
    const expanded = button.getAttribute('aria-expanded') === 'true';

    button.setAttribute('aria-expanded', String(!expanded));
    menu.classList.toggle('hidden');
  };

  const closeDropdown = () => {
    button.setAttribute('aria-expanded', 'false');
    menu.classList.add('hidden');
  };

  button.addEventListener('click', (e) => {
    if (e.target.closest('.dropdown-toggle-area')) {
      toggleDropdown(e);
      return;
    }

    ACTIONS[selectedAction].run();
  });

  menu.querySelectorAll('.dropdown-item').forEach((item) => {
    item.addEventListener('click', async () => {
      const actionKey = item.dataset.action;
      if (!ACTIONS[actionKey]) return;

      setSelected(actionKey);
      closeDropdown();
      await ACTIONS[actionKey].run();
    });
  });

  document.addEventListener('click', (event) => {
    if (!button.contains(event.target) && !menu.contains(event.target)) {
      closeDropdown();
    }
  });

  setSelected(selectedAction);
});
</script>

<style>

}

  background-color: #fff;

  border-radius: 1rem;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);

}

.dropdown-item {

  }

    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
  }

  .page-actions .dropdown-item {
    color: rgba(255, 255, 255, 0.9);
  }

  .page-actions .dropdown-item:hover,

  }

  .page-actions .item-description,
  .page-actions .button-icon,
  .page-actions .item-icon,

  }

</style>
